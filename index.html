<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro espacio secreto</title>

<style>

body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:30px;
font-size:28px;
background:#1e293b;
}

section{
padding:40px;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.galeria img{
width:100%;
border-radius:12px;
}

video{
width:300px;
border-radius:12px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
cursor:pointer;
font-size:16px;
}

#reto{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<header>
Nuestro espacio secreto 💙
</header>

<section>

<h2>Álbum</h2>

<div class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

</div>

</section>

<section>

<h2>Videos</h2>

<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

</section>

<section>

<h2>Juego sorpresa 🎲</h2>

<button onclick="reto()">Dame un reto</button>

<p id="reto"></p>

</section>

<script>

function reto(){

let retos=[
"Dame un beso 💋",
"Abrazo obligatorio 🤗",
"Tenemos que ver una peli juntos 🎬",
"Hoy toca cita 😏"
]

let random=Math.floor(Math.random()*retos.length)

document.getElementById("reto").innerText=retos[random]

}

</script>

</body>
</html>
