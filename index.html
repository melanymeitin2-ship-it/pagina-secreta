<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuestro espacio secreto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

section{
padding:40px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#38bdf8;
font-size:16px;
cursor:pointer;
margin:10px;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

#contenido{
display:none;
}

#album{
display:none;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.galeria img{
width:100%;
border-radius:12px;
}

video{
width:300px;
border-radius:12px;
}

</style>
</head>

<body>

<section id="login">

<h2>Entrar a nuestro espacio secreto 🔐</h2>

<input type="password" id="clave" placeholder="Contraseña">

<br><br>

<button onclick="entrar()">Entrar</button>

</section>

<section id="contenido">

<h1>Bienvenida 💙</h1>

<p>Este es nuestro espacio secreto.</p>

<button onclick="abrirAlbum()">Ver álbum 📸</button>

<button onclick="reto()">Juego sorpresa 🎲</button>

<p id="mensaje"></p>

</section>

<section id="album">

<h2>Nuestro álbum</h2>

<button onclick="volver()">⬅ Volver</button>

<div class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

</div>

<br>

<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

</section>

<script>

function entrar(){

let pass=document.getElementById("clave").value

if(pass==="2411"){

document.getElementById("login").style.display="none"
document.getElementById("contenido").style.display="block"

}else{

alert("Contraseña incorrecta")

}

}

<section id="album">

<h2>Nuestro álbum 📸</h2>

<button onclick="volver()">⬅ Volver</button>

<br><br>

<input type="file" id="subirFoto" accept="image/*,video/*">

<br><br>

<button onclick="mostrarArchivo()">Subir al álbum</button>

<div class="galeria" id="galeria"></div>
function mostrarArchivo(){

let input = document.getElementById("subirFoto")
let archivo = input.files[0]

if(!archivo) return

let url = URL.createObjectURL(archivo)

let galeria = document.getElementById("galeria")

if(archivo.type.startsWith("image")){

let img = document.createElement("img")
img.src = url
galeria.appendChild(img)

}else if(archivo.type.startsWith("video")){

let video = document.createElement("video")
video.src = url
video.controls = true
galeria.appendChild(video)

}

}
</section>

function reto(){

let retos=[
"una chupadita 💋",
"Abrazo obligatorio 🤗",
"Hoy toca cita 😏",
"Ver una peli juntos 🎬"
]

let random=Math.floor(Math.random()*retos.length)

document.getElementById("mensaje").innerText=retos[random]

}

</script>

</body>
</html>
