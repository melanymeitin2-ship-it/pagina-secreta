<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro lugar secreto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

section{padding:40px;}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#38bdf8;
font-size:16px;
cursor:pointer;
margin:10px;
}

input,textarea{
padding:10px;
border-radius:8px;
border:none;
}

#menu,#album,#notas,#reto{display:none;}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.galeria img{
width:100%;
border-radius:12px;
}

.post{
background:#fde68a;
color:black;
padding:15px;
border-radius:10px;
margin:10px;
display:inline-block;
max-width:200px;
}
</style>
</head>

<body>

<section id="login">
<h2>Entrar a nuestro lugar secreto 🔐</h2>
<input type="password" id="clave" placeholder="Contraseña">
<br><br>
<button onclick="entrar()">Entrar</button>
</section>

<section id="menu">
<h1>Hola mi amor ❤️</h1>
<p>Este es nuestro lugar secreto</p>

<button onclick="abrirReto()">🔥 Verdad o reto</button>
<button onclick="abrirAlbum()">📸 Álbum</button>
<button onclick="abrirNotas()">📝 Notitas</button>
</section>

<section id="reto">
<h2>Verdad o reto 🔥</h2>
<button onclick="nuevoReto()">Nuevo reto</button>
<p id="textoReto"></p>
<br>
<button onclick="volverMenu()">⬅ Volver</button>
</section>

<section id="album">
<h2>Nuestro álbum 📸</h2>

<input type="file" id="fotoInput">
<button onclick="subirFoto()">Subir foto</button>

<div class="galeria" id="galeria"></div>

<br>
<button onclick="volverMenu()">⬅ Volver</button>
</section>

<section id="notas">
<h2>Nuestras notitas 📝</h2>

<textarea id="notaTexto" placeholder="Escribí algo lindo"></textarea>
<br>
<button onclick="guardarNota()">Guardar</button>

<div id="muro"></div>

<br>
<button onclick="volverMenu()">⬅ Volver</button>
</section>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyAjotc59F0jGDMbUOpJSrFNGjm1eIAZ88Y",
authDomain: "nuestro-lugar-secreto.firebaseapp.com",
projectId: "nuestro-lugar-secreto",
storageBucket: "nuestro-lugar-secreto.firebasestorage.app",
messagingSenderId: "906469121429",
appId: "1:906469121429:web:90a0edeebd71d97dc5aa9c",
measurementId: "G-K4EVE531NM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.entrar = function(){
let pass=document.getElementById("clave").value
if(pass==="2411"){
document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"
}else{
alert("Contraseña incorrecta")
}
}

window.abrirAlbum=function(){
document.getElementById("menu").style.display="none"
document.getElementById("album").style.display="block"
cargarFotos()
}

window.abrirNotas=function(){
document.getElementById("menu").style.display="none"
document.getElementById("notas").style.display="block"
cargarNotas()
}

window.abrirReto=function(){
document.getElementById("menu").style.display="none"
document.getElementById("reto").style.display="block"
}

window.volverMenu=function(){
document.getElementById("album").style.display="none"
document.getElementById("notas").style.display="none"
document.getElementById("reto").style.display="none"
document.getElementById("menu").style.display="block"
}

window.subirFoto=async function(){

let archivo=document.getElementById("fotoInput").files[0]

const storageRef = ref(storage,"fotos/"+archivo.name)

await uploadBytes(storageRef,archivo)

alert("Foto subida ❤️")

cargarFotos()
}

async function cargarFotos(){

let galeria=document.getElementById("galeria")
galeria.innerHTML=""

const listRef=ref(storage,"fotos")

const res=await listAll(listRef)

for(const item of res.items){

let url=await getDownloadURL(item)

let img=document.createElement("img")
img.src=url

galeria.appendChild(img)
}

}

window.guardarNota=async function(){

let texto=document.getElementById("notaTexto").value

await addDoc(collection(db,"notas"),{
texto:texto
})

document.getElementById("notaTexto").value=""

cargarNotas()
}

async function cargarNotas(){

let muro=document.getElementById("muro")
muro.innerHTML=""

const querySnapshot=await getDocs(collection(db,"notas"))

querySnapshot.forEach((doc)=>{

let div=document.createElement("div")
div.className="post"
div.innerText=doc.data().texto

muro.appendChild(div)

})
}

window.nuevoReto=function(){

let retos=[
"Beso de 20 segundos",
"Contame una fantasía",
"Masaje obligatorio",
"Besos por todo el cuello",
"Decime qué te gustaría hacer conmigo"
]

let random=Math.floor(Math.random()*retos.length)

document.getElementById("textoReto").innerText=retos[random]

}

</script>

</body>
</html>
